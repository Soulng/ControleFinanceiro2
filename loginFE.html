<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="cssLoginFE/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="PopUp/toast.css">
    <title>Login - Finance Easy</title>
</head>
<body>
  <h2>Entre ou cadastre-se!</h2>
  <div class="container" id="container">
    <div class="form-container sign-up-container">
      <form id="signup-form" onsubmit="return false;">
        <h1>Crie uma conta</h1>
        <input type="text" id="signup-nome" placeholder="Nome" required />
        <input type="email" id="signup-email" placeholder="Email" required />
        <input type="password" id="signup-senha" placeholder="Senha" required />
        <input type="date" id="signup-nascimento" required />
        <input type="text" id="signup-ocupacao" placeholder="Ocupação" />
        <button type="button" onclick="cadastrarUsuario()">Cadastrar</button>
      </form>
    </div>
    <div class="form-container sign-in-container">
      <form action="#" onsubmit="return false;">
        <h1>Entre na sua conta</h1>
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-senha" placeholder="Senha" required />
        <a href="#">Esqueceu sua senha?</a>
        <button type="button" onclick="loginUsuario()">Entrar</button>
      </form>
    </div>
    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel overlay-left">
          <h1>Bem vindo de volta!</h1>
          <p>Pronto para cuidar do seu dinheiro hoje?</p>
          <button class="ghost" id="signIn">Entrar</button>
        </div>
        <div class="overlay-panel overlay-right">
          <h1>Venha fazer parte!</h1>
          <p>Crie uma conta e economize já!</p>
          <button class="ghost" id="signUp">Cadastrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="javascriptLoginFE/script.js"></script>
  <script src="PopUp/toast.js"></script>
</body>
</html>

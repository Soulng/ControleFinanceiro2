<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Easy — API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; background: #fafafa; }
        .topbar { background-color: #2A9D8F !important; }
        .topbar-wrapper img { display: none; }
        .topbar-wrapper::after {
            content: "Finance Easy — API de Exportação";
            color: white;
            font-size: 18px;
            font-weight: bold;
            font-family: sans-serif;
        }

        /* Banner de aviso de autenticação */
        #auth-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-left: 5px solid #ffc107;
            color: #856404;
            padding: 12px 20px;
            font-family: sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #auth-banner a {
            color: #2A9D8F;
            font-weight: bold;
            text-decoration: none;
        }
        #auth-banner a:hover { text-decoration: underline; }
        #auth-banner span.icon { font-size: 20px; }
    </style>
</head>
<body>

    <!-- Aviso visível para o usuário lembrar de estar logado -->
    <div id="auth-banner">
        <span class="icon">⚠️</span>
        <span>
            Esta API requer autenticação via sessão.
            <a href="index.html" target="_blank">Faça login no sistema</a>
            antes de testar os endpoints — o cookie de sessão será enviado automaticamente.
        </span>
    </div>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            url: "swagger.yaml",
            dom_id: '#swagger-ui',
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIBundle.SwaggerUIStandalonePreset
            ],
            layout: "BaseLayout",
            deepLinking: true,

            // ↓ ESSENCIAL: envia o cookie PHPSESSID junto com cada requisição
            requestInterceptor: (request) => {
                request.credentials = 'include';
                return request;
            }
        });
    </script>
</body>
</html>
